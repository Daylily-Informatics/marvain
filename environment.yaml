---
channels:
  - conda-forge
  - defaults
dependencies:
  # Python packages come from the editable pip install defined in pyproject.toml.
  - python=3.12
  - pip

  # System and command-line tools used by local development.
  # AWS command-line tooling and Session Manager Plugin are expected from the
  # host install, not conda packages, because amazon-transcribe requires a
  # conflicting awscrt pin.
  - bash
  - jq
  - yq
  - libsndfile
